name: koubo-watch-daily

on:
  schedule:
    - cron: "0 22 * * *"   # 毎日 07:00 JST (22:00 UTC)
  workflow_dispatch: {}      # 手動実行も可

permissions:
  contents: write            # seen.json を更新コミットするため

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: koubo-watch
        run: pip install -r requirements.txt

      - name: Run
        working-directory: koubo-watch
        env:
          DELIVERY: ${{ secrets.DELIVERY }}
          CHATWORK_TOKEN: ${{ secrets.CHATWORK_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python main.py

      - name: Persist seen.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add koubo-watch/data/seen.json
          git diff --staged --quiet || git commit -m "update seen.json [skip ci]"
          git push
